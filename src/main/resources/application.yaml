spring:
  application:
    name: my-shop

  datasource:
    url: ${BD_URL}
    username: ${BD_USERNAME}
    password: ${BD_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    secret-key: ${JWT_SECRET}
    expiration-time: ${EXPIRATION_TOKEN}

stripe:
  api:
    key: ${STRIPE_KEY}
  webhook:
    secret: ${WEBHOOK_SECRET}

app:
  frontend:
    url: ${URL_FRONTEND}